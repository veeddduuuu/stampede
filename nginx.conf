worker_processes auto;

events {
    worker_connections 4096;
}

http {
    upstream stampede-backend {
        least_conn;
        server api1:8080;
        server api2:8080;
        server api3:8080;

        keepalive 64;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://stampede-backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}