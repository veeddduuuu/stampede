services:
  redis:
    container_name: redis
    image: redis:latest
    ports:
      - "6379:6379"

  redis-commander:
    container_name: redis-commander
    image: rediscommander/redis-commander:latest
    ports:
      - "8081:8081"
    restart: always
    environment:
      - REDIS_HOSTS=local:redis:6379