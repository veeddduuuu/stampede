services:
  stampede-redis:
    container_name: stampede-redis
    image: redis:latest
    ports:
      - "6381:6379"

  stampede-nginx:
    container_name: stampede-nginx
    image: nginx:latest
    ports:
      - "8001:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api1
      - api2
      - api3
    restart: always

  api1:
    build: .
    container_name: stampede-api1
    ports:
      - "8080:8080"
    depends_on:
      - stampede-redis
    environment:
      - POSTGRES_URL=${POSTGRES_URL}
      - REDIS_ADDR=stampede-redis:6379
    restart: always

  api2:
    build: .
    container_name: stampede-api2
    ports:
      - "8083:8080"
    depends_on:
      - stampede-redis
    environment:
      - POSTGRES_URL=${POSTGRES_URL}
      - REDIS_ADDR=stampede-redis:6379
    restart: always

  api3:
    build: .
    container_name: stampede-api3
    ports:
      - "8082:8080"
    depends_on:
      - stampede-redis
    environment:
      - POSTGRES_URL=${POSTGRES_URL}
      - REDIS_ADDR=stampede-redis:6379
    restart: always